name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  publish:
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.result == 'success'
    environment: testpypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Build package
        run: |
          rm -rf dist/
          uv build
          uv run twine check dist/*

      - name: Publish to TestPyPI
        run: uv run twine upload --repository testpypi dist/*

  trigger-rtd:
    runs-on: ubuntu-latest
    needs: publish
    if: needs.publish.result == 'success'
    env:
      READTHEDOCS_API_KEY: ${{ secrets.READTHEDOCS_API_KEY }}

    steps:
      - name: Trigger Read the Docs build
        if: ${{ env.READTHEDOCS_API_KEY != '' }}
        run: |
          curl -X POST \
            -H "Authorization: Token ${READTHEDOCS_API_KEY}" \
            https://readthedocs.org/api/v3/projects/module-manager/versions/latest/builds/
